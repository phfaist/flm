template_engine: 'flm.main.template.SimpleStringTemplate'
template_engine_config:
  template_content_filename: 'html/docgen.html'

default_config:

  metadata:
    title: 'Documentation of an FLM Environment'

  render_header: true

  font:
    family: 'Merriweather'
    load_google_fonts: true
    google_fonts_link_url: 'https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap'
    default_families: 'Georgia, serif'
    size: '15px'
    line_height: '1.65em'

  layout:
    content_width: '760px'

  style:
    font_css: |
      html, body { /* for Merriweather font */
        font-optical-sizing: auto;
        font-weight: 350;
        font-style: normal;
        font-variation-settings:
            "wdth" 110,
            "opsz" 35;
        letter-spacing: .03em;
      }

    extra_css: ''
    extra_js: ''
